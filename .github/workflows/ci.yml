name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kodu
        uses: actions/checkout@v4

      - name: Setup Pythona
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalacja zaleznosci
        run: pip install -r app/requirements.txt

      - name: Testy
        run: pytest app/ -v

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout kodu
        uses: actions/checkout@v4

      - name: Build obrazu Dockera
        run: docker build -t flask-app:${{ github.sha }} app/
